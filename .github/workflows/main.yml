name: Python App CI Pipeline

# Запускати цей сценарій при кожному пуші в гілку main або master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    # ЗАВДАННЯ 3: Мультиверсійне тестування
    strategy:
      matrix:
        python-version: ["3.10", "3.11"] # Запускаємо для двох версій Python

    steps:
    - name: Завантаження коду репозиторію
      uses: actions/checkout@v4

    - name: Встановлення Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Встановлення системних залежностей (для Tkinter)
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb

    - name: Встановлення Python залежностей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ЗАВДАННЯ 2: Перевірка стилю коду (Linting)
    - name: Перевірка коду за допомогою Flake8
      run: |
        # --exit-zero означає, що пайплайн не впаде, якщо знайде порушення стилю
        flake8 . --count --exit-zero --max-line-length=120 --statistics

    # ЗАВДАННЯ 1 та 5: Автоматичне тестування з Pytest та HTML-звіт
    - name: Запуск тестів та генерація HTML-звіту
      run: |
        # xvfb-run створює віртуальний монітор, щоб Tkinter не викликав помилку
        xvfb-run pytest --html=report-${{ matrix.python-version }}.html --self-contained-html

    - name: Збереження HTML-звіту (Artifact)
      uses: actions/upload-artifact@v4
      if: always() # Зберегти звіт, навіть якщо тести впали
      with:
        name: test-report-python-${{ matrix.python-version }}
        path: report-${{ matrix.python-version }}.html

  # ЗАВДАННЯ 4: Збірка Docker-контейнера
  build-docker:
    runs-on: ubuntu-latest
    needs: test-and-lint # Запускати збірку Docker ТІЛЬКИ якщо тести пройшли успішно
    
    steps:
    - name: Завантаження коду
      uses: actions/checkout@v4

    - name: Збірка Docker образу
      run: |
        docker build -t chaos-app-image .
